name: Deploy to Alibaba Cloud

on:
  push:
    branches: [main]

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Copy frontend build to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "frontend/dist/"
          target: "/var/www/credit-backtest-studio-frontend/"
          strip_components: 2

  # Backend deploy is independent and non-blocking: a failure here never
  # reddens the run or blocks the frontend deploy above.
  deploy-backend:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Deploy backend & reload services
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            REPO=/var/www/credit-backtest-studio
            if [ ! -d "$REPO/.git" ]; then
              echo "repo dir missing — cloning fresh"
              rm -rf "$REPO"
              git clone https://github.com/oct28th-creator/credit-backtest-studio.git "$REPO"
            fi
            cd "$REPO"
            git fetch origin main
            git reset --hard origin/main
            # keep the server-side .env (API key) across deploys
            git clean -fd -e backend/.env || git clean -fd

            SUDO=""; if sudo -n true 2>/dev/null; then SUDO="sudo -n"; fi
            echo "Using SUDO='$SUDO' as user $(whoami)"

            # Provision .env from a repo secret when provided (source of truth);
            # otherwise leave any manually-created backend/.env untouched.
            if [ -n "${{ secrets.DEEPSEEK_API_KEY }}" ]; then
              printf 'DEEPSEEK_API_KEY=%s\nDEEPSEEK_MODEL=deepseek-v4-pro\nDEEPSEEK_BASE_URL=https://api.deepseek.com\nCORS_ORIGINS=http://localhost:5173,http://%s\n' "${{ secrets.DEEPSEEK_API_KEY }}" "${{ secrets.SERVER_HOST }}" > backend/.env
              echo ".env provisioned from secret"
            else
              echo "WARN: DEEPSEEK_API_KEY secret not set — AI will use backend mock (set the secret for real DeepSeek)"
            fi

            # Best-effort: install/refresh the systemd unit (corrected path) and reload
            $SUDO cp deploy/backtest-backend.service /etc/systemd/system/backtest-backend.service 2>/dev/null \
              && $SUDO systemctl daemon-reload 2>/dev/null \
              && echo "systemd unit refreshed" \
              || echo "WARN: could not refresh systemd unit (insufficient perms?) — continuing"

            cd backend
            # Server Python is PEP 668 "externally managed"; deps are already
            # present system-wide, so install is best-effort and non-fatal.
            pip3 install -r requirements.txt -q --break-system-packages \
              || pip3 install -r requirements.txt --break-system-packages \
              || echo "WARN: pip install skipped (deps likely already present)"

            $SUDO systemctl enable backtest-backend 2>/dev/null || true
            $SUDO systemctl restart backtest-backend 2>/dev/null || systemctl restart backtest-backend 2>/dev/null || echo "WARN: could not restart service"
            sleep 3
            if $SUDO systemctl is-active --quiet backtest-backend 2>/dev/null || systemctl is-active --quiet backtest-backend 2>/dev/null; then
              echo "backtest-backend is active"
            else
              echo "::warning::backtest-backend not active — recent logs:"
              ($SUDO journalctl -u backtest-backend -n 40 --no-pager 2>/dev/null || journalctl -u backtest-backend -n 40 --no-pager 2>/dev/null) || true
            fi
            # Smoke-test the API through the local service
            curl -fsS http://127.0.0.1:8000/api/samples >/dev/null && echo "API healthy" || echo "WARN: /api/samples smoke test failed"
            echo "Deploy complete at $(date)"
