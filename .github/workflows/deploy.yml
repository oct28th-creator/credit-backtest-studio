name: Deploy to Alibaba Cloud

on:
  push:
    branches: [main]

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Copy frontend build to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "frontend/dist/"
          target: "/var/www/credit-backtest-studio-frontend/"
          strip_components: 2

  # Backend deploy is independent and non-blocking: a failure here never
  # reddens the run or blocks the frontend deploy above.
  deploy-backend:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Deploy backend & reload services
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            REPO=/var/www/credit-backtest-studio
            if [ ! -d "$REPO/.git" ]; then
              echo "repo dir missing — cloning fresh"
              rm -rf "$REPO"
              git clone https://github.com/oct28th-creator/credit-backtest-studio.git "$REPO"
            fi
            cd "$REPO"
            git fetch origin main
            git reset --hard origin/main
            # keep the server-side .env (API key) across deploys
            git clean -fd -e backend/.env

            SUDO=""; sudo -n true 2>/dev/null && SUDO="sudo -n"

            # Provision .env from a repo secret when provided (source of truth);
            # otherwise leave any manually-created backend/.env untouched.
            if [ -n "${{ secrets.DEEPSEEK_API_KEY }}" ]; then
              printf 'DEEPSEEK_API_KEY=%s\nDEEPSEEK_MODEL=deepseek-v4-pro\nDEEPSEEK_BASE_URL=https://api.deepseek.com\nCORS_ORIGINS=http://localhost:5173,http://%s\n' "${{ secrets.DEEPSEEK_API_KEY }}" "${{ secrets.SERVER_HOST }}" > backend/.env
            fi

            # Install/refresh the systemd unit (path was corrected) and reload
            $SUDO cp deploy/backtest-backend.service /etc/systemd/system/backtest-backend.service
            $SUDO systemctl daemon-reload

            cd backend
            pip3 install -r requirements.txt -q

            $SUDO systemctl enable backtest-backend 2>/dev/null || true
            $SUDO systemctl restart backtest-backend
            sleep 3
            if ! $SUDO systemctl is-active --quiet backtest-backend; then
              echo "::error::backtest-backend failed to start — recent logs:"
              $SUDO journalctl -u backtest-backend -n 40 --no-pager || true
              exit 1
            fi
            # Smoke-test the API through the local service
            curl -fsS http://127.0.0.1:8000/api/strategies >/dev/null && echo "API healthy" || echo "WARN: /api/strategies smoke test failed"
            echo "Deploy complete at $(date)"
