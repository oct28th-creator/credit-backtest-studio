# HTTP: serve ACME challenges and redirect everything else to HTTPS.
# Until a certificate is issued (certbot --nginx), comment out the redirect
# line and uncomment the `location /` / `location /api/` blocks below so the
# site still serves over plain HTTP.
server {
    listen 80;
    server_name _;

    # Let's Encrypt HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Force HTTPS once a cert exists.
    return 301 https://$host$request_uri;

    # --- Pre-TLS fallback (uncomment if no cert yet) ---------------------
    # root /var/www/credit-backtest-studio-frontend;
    # index index.html;
    # location / { try_files $uri $uri/ /index.html; }
    # location /api/ { include /etc/nginx/snippets/backtest-proxy.conf; }
}

server {
    # HTTPS. Requires a certificate; certbot --nginx fills in the ssl_* lines.
    listen 443 ssl;
    http2 on;
    server_name _;

    # ssl_certificate     /etc/letsencrypt/live/<domain>/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/<domain>/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Frontend static files
    root /var/www/credit-backtest-studio-frontend;
    index index.html;

    # Cap request bodies so an oversize upload is rejected at the edge,
    # matching the backend's 50 MB limit (defence in depth for S5).
    client_max_body_size 50m;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Frontend SPA — all non-API routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy → FastAPI
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE streaming — disable buffering
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        chunked_transfer_encoding on;

        # Longer timeout for AI streaming
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
